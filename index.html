<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ggreens">
<title>Ggreens — Grow Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gd:#2d4a1e;--gm:#4a7c35;--gl:#7ab648;--gp:#e8f0e0;--gmist:#f4f8ef;--ink:#1a2614;--inkm:#3d5030;--inkl:#7a9068;--border:#c8dab8;--borderl:#e0ebcf;--bg:#fafcf7;--white:#fff;--amber:#c8820a;--amberp:#fdf3dc;--red:#b83030;--redp:#fce8e8;--blue:#2a5f8a;--bluep:#e4eef8;--purple:#534AB7;--purplep:#eeedfe;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px}
.header{background:var(--gd);padding:14px 20px 12px;position:sticky;top:0;z-index:100}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:#fff;letter-spacing:-0.02em}
.logo span{color:var(--gl)}
.hdate{font-size:11px;color:rgba(255,255,255,0.5);font-family:'DM Mono',monospace}
.nav{background:var(--gd);border-bottom:1px solid rgba(255,255,255,0.1);overflow-x:auto}
.nav-inner{max-width:720px;margin:0 auto;display:flex;min-width:max-content}
.nb{padding:10px 14px;border:none;background:none;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
.nb.active{color:#fff;border-bottom-color:var(--gl)}
.bdot{display:inline-block;width:6px;height:6px;background:var(--amber);border-radius:50%;margin-left:4px;vertical-align:middle;margin-bottom:1px}
.main{max-width:720px;margin:0 auto;padding:16px 14px 80px}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.metric{background:var(--white);border:1px solid var(--borderl);border-radius:var(--r);padding:10px 8px;text-align:center;cursor:pointer;transition:all 0.15s;user-select:none}
.metric:hover{border-color:var(--gm);background:var(--gmist)}
.metric.active-filter{border-color:var(--gm);background:var(--gp);box-shadow:0 0 0 2px #7ab64833}
.metric-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--gd);line-height:1;margin-bottom:3px}
.metric-label{font-size:10px;color:var(--inkl);line-height:1.3}
.metric.alert .metric-val{color:var(--amber)}
.filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.filter-clear{font-size:12px;color:var(--gm);cursor:pointer;padding:4px 8px;border:1px solid var(--borderl);border-radius:var(--rs);background:none;font-family:'DM Sans',sans-serif}
.filter-clear:hover{background:var(--gp)}
.inner-tabs{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:14px}
.itab{flex:1;padding:8px 6px;border:none;background:var(--bg);color:var(--inkl);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;border-right:1px solid var(--border)}
.itab:last-child{border-right:none}
.itab.active{background:var(--gd);color:#fff;font-weight:500}
.slabel{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--inkl);margin-bottom:10px;font-family:'DM Mono',monospace}
.task-item{background:var(--white);border:1px solid var(--borderl);border-left:3px solid var(--gl);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.task-item.urgent{border-left-color:var(--amber)}
.task-item.htask{border-left-color:var(--red)}
.task-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.task-title{font-weight:500;font-size:14px}
.task-sub{font-size:12px;color:var(--inkl);margin-top:2px}
.plant-summary{background:var(--gd);border-radius:var(--r);padding:13px 15px;margin-bottom:16px}
.plant-summary-title{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.6);font-family:'DM Mono',monospace;margin-bottom:10px}
.plant-sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.plant-sum-row:last-child{border-bottom:none}
.plant-sum-name{font-size:13px;color:rgba(255,255,255,0.9);display:flex;align-items:center;gap:6px;margin-bottom:2px}
.plant-sum-detail{font-size:11px;color:rgba(255,255,255,0.45)}
.plant-sum-tray{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#fff;white-space:nowrap;margin-left:10px;text-align:right}
.plant-sum-tray-ceil{font-size:10px;color:var(--gl);display:block}
.cust-accordion{background:var(--white);border:1px solid var(--borderl);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.cust-acc-hd{padding:13px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s;user-select:none}
.cust-acc-hd:hover{background:var(--gmist)}
.cust-acc-hd.open{border-bottom:1px solid var(--borderl)}
.cust-name{font-weight:500;font-size:15px}
.cust-meta{font-size:12px;color:var(--inkl);margin-top:2px}
.cust-chevron{font-size:14px;color:var(--inkl);transition:transform 0.2s;display:inline-block}
.cust-chevron.open{transform:rotate(180deg)}
.cust-acc-body{display:none}
.cust-acc-body.open{display:block}
.order-card{border-top:1px solid var(--borderl)}
.order-hd{padding:11px 15px 9px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--borderl)}
.ocust{font-weight:500;font-size:14px}
.ometa{font-size:12px;color:var(--inkl);margin-top:2px}
.sbadge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;font-family:'DM Mono',monospace}
.s-pending{background:#f0ede8;color:#5a4e3c}.s-soak{background:var(--bluep);color:var(--blue)}
.s-blackout{background:var(--purplep);color:var(--purple)}.s-grow{background:var(--gmist);color:var(--gm)}.s-done{background:#f0f0f0;color:#888}
.card-actions{display:flex;align-items:center;gap:6px}
.edit-btn{background:none;border:1px solid var(--borderl);border-radius:var(--rs);cursor:pointer;color:var(--inkl);font-size:12px;padding:3px 9px;font-family:'DM Sans',sans-serif}
.edit-btn:hover{background:var(--gmist);border-color:var(--gm);color:var(--gm)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--inkl);font-size:17px;padding:1px 5px;border-radius:4px;line-height:1}
.del-btn:active{background:var(--redp);color:var(--red)}
.phase-row{padding:8px 15px;border-bottom:1px solid var(--borderl)}
.phase-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;background:var(--borderl);margin-bottom:3px}
.phase-seg{height:100%}
.phase-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--inkl);font-family:'DM Mono',monospace}
.tl-grid{padding:9px 15px}
.tl-row{display:flex;align-items:baseline;padding:3px 0;font-size:13px}
.tl-label{width:110px;flex-shrink:0;font-size:11px;color:var(--inkl);font-family:'DM Mono',monospace}
.today-chip{display:inline-block;background:var(--amberp);color:var(--amber);font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;margin-left:6px;font-family:'DM Mono',monospace}
.d-chip{font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;margin-left:5px;font-family:'DM Mono',monospace}
.d-chip.past{background:var(--redp);color:var(--red)}
.d-chip.soon{background:var(--amberp);color:var(--amber)}
.d-chip.future{background:var(--gmist);color:var(--gm)}
.vdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.tray-chip{display:inline-block;background:var(--gp);color:var(--gd);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;margin-left:6px}
.date-group{margin-bottom:18px}
.date-group-hd{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--gd);letter-spacing:0.04em;padding:6px 0;border-bottom:2px solid var(--borderl);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.date-group-count{font-size:11px;color:var(--inkl);font-weight:400}
.order-list-row{background:var(--white);border:1px solid var(--borderl);border-radius:var(--rs);padding:10px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.olr-cust{font-weight:500;font-size:14px}
.olr-variety{font-size:12px;color:var(--inkl);margin-top:2px}
.olr-right{text-align:right}
.olr-unit{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--gd)}
.olr-tray{font-size:11px;color:var(--inkl);margin-top:2px;font-family:'DM Mono',monospace}
.form-card{background:var(--white);border:1px solid var(--borderl);border-radius:var(--r);padding:16px;margin-bottom:12px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--inkl);margin-bottom:5px;font-family:'DM Mono',monospace}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--ink);appearance:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gm);background:var(--white)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.submit-btn{width:100%;padding:12px;background:var(--gd);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:14px;transition:background 0.15s}
.submit-btn:active{background:var(--gm)}
.prev-box{background:var(--gmist);border:1px solid var(--borderl);border-radius:var(--rs);padding:12px;margin-top:12px}
.prev-title{font-size:11px;font-weight:500;color:var(--inkl);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.prev-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--borderl);font-size:12px}
.prev-row:last-child{border-bottom:none}
.prev-row .pk{color:var(--inkl)}.prev-row .pv{font-weight:500;font-family:'DM Mono',monospace;font-size:11px}
.prev-row.hl .pv{color:var(--gm)}
.prev-row.warn .pv{color:var(--amber)}
.unit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
.unit-btn{padding:8px 4px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--inkl);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;text-align:center;transition:all 0.15s}
.unit-btn.active{border-color:var(--gm);background:var(--gp);color:var(--gd);font-weight:500}
.mode-tabs{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:16px}
.mode-btn{flex:1;padding:9px 6px;border:none;background:var(--bg);color:var(--inkl);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;border-right:1px solid var(--border)}
.mode-btn:last-child{border-right:none}
.mode-btn.active{background:var(--gd);color:#fff;font-weight:500}
.bulk-hdr{display:grid;grid-template-columns:1.5fr 1.4fr 70px 1fr 28px;gap:6px;margin-bottom:4px}
.bulk-col{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--inkl);font-family:'DM Mono',monospace}
.bulk-row-item{display:grid;grid-template-columns:1.5fr 1.4fr 70px 1fr 28px;gap:6px;align-items:center;margin-bottom:6px}
.bi{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);appearance:none;-webkit-appearance:none}
.bi:focus{outline:none;border-color:var(--gm);background:var(--white)}
.add-row-btn{width:100%;padding:7px;background:none;border:1px dashed var(--border);border-radius:var(--rs);color:var(--inkl);font-size:13px;cursor:pointer;margin-top:4px}
.add-row-btn:hover{border-color:var(--gm);color:var(--gm)}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--inkl);font-size:16px;padding:3px;border-radius:4px;line-height:1}
.rm-btn:hover{color:var(--red);background:var(--redp)}
.bulk-sum{background:var(--gmist);border:1px solid var(--borderl);border-radius:var(--rs);padding:10px 12px;margin-top:10px}
.bsum-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;gap:8px}
.bsum-row .bk{color:var(--inkl)}.bsum-row .bv{font-family:'DM Mono',monospace;font-weight:500;font-size:11px;white-space:nowrap}
.inv-drop{border:2px dashed var(--border);border-radius:var(--r);padding:24px 20px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:10px}
.inv-drop:hover,.inv-drop.drag-over{border-color:var(--gm);background:var(--gmist)}
.inv-drop-icon{font-size:26px;margin-bottom:6px}
.inv-drop-text{font-size:13px;color:var(--inkl)}
.inv-drop-sub{font-size:11px;color:var(--inkl);margin-top:3px;opacity:0.7}
.inv-ta{width:100%;min-height:110px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);resize:vertical}
.inv-ta:focus{outline:none;border-color:var(--gm);background:var(--white)}
.parse-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.parse-btn:active{background:#1a4a6e}.parse-btn:disabled{opacity:0.6;cursor:not-allowed}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--redp);border:1px solid #e8a0a0;border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--red);margin-top:10px}
.ai-result-box{background:var(--white);border:1px solid var(--borderl);border-radius:var(--r);overflow:hidden;margin-top:12px}
.ai-result-hd{padding:10px 13px;background:var(--gmist);border-bottom:1px solid var(--borderl);display:flex;align-items:center;justify-content:space-between}
.ai-result-title{font-size:13px;font-weight:500;color:var(--gd)}
.parsed-row{display:grid;grid-template-columns:20px 1fr 1fr 1fr 50px;gap:5px;align-items:center;padding:7px 12px;border-bottom:1px solid var(--borderl);font-size:13px}
.parsed-row:last-child{border-bottom:none}
.ai-chk{width:15px;height:15px;cursor:pointer;accent-color:var(--gm)}
.ai-f{padding:4px 7px;border:1px solid transparent;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12px;background:transparent;color:var(--ink);width:100%;appearance:none;-webkit-appearance:none}
.ai-f:focus{outline:none;border-color:var(--gm);background:var(--white)}
.confirm-btn{width:100%;padding:11px;background:var(--gd);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:var(--r);padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px;color:var(--gd)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-save{flex:1;padding:11px;background:var(--gd);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.modal-cancel{padding:11px 16px;background:none;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--inkl)}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:6px 12px;cursor:pointer;font-size:13px;color:var(--inkm);font-family:'DM Sans',sans-serif}
.cal-nav:hover{background:var(--gp)}
.cal-month{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gd)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--inkl);padding:6px 0;font-weight:500}
.cal-day{min-height:100px;background:var(--white);border:1px solid var(--borderl);border-radius:var(--rs);padding:5px 6px;cursor:pointer;transition:background 0.1s}
.cal-day:hover{background:var(--gmist)}
.cal-day.om{background:var(--bg);opacity:0.45;cursor:default}
.cal-day.om:hover{background:var(--bg)}
.cal-day.is-today{border-color:var(--gm);border-width:2px}
.cal-day-num{font-size:11px;font-family:'DM Mono',monospace;color:var(--inkl);margin-bottom:3px}
.cal-day.is-today .cal-day-num{color:var(--gm);font-weight:500}
.cal-ev{font-size:9px;font-weight:500;border-radius:2px;padding:2px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.cal-leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--inkl)}
.cal-leg-dot{width:10px;height:10px;border-radius:2px}
.day-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.day-modal{background:var(--white);border-radius:var(--r);padding:20px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto}
.day-modal-title{font-size:15px;font-weight:500;color:var(--gd);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.day-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--inkl);line-height:1;padding:2px 6px}
.day-ev-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--borderl)}
.day-ev-item:last-child{border-bottom:none}
.day-ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.day-ev-name{font-weight:500;font-size:13px}
.day-ev-sub{font-size:12px;color:var(--inkl);margin-top:2px}
.raw-wrap{overflow-x:auto;margin-bottom:16px}
.raw-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:580px}
.raw-tbl th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--inkl);font-family:'DM Mono',monospace;padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;background:var(--gmist);white-space:nowrap}
.raw-tbl td{padding:6px 8px;border-bottom:1px solid var(--borderl);vertical-align:middle}
.raw-tbl tr:last-child td{border-bottom:none}.raw-tbl tr:hover td{background:var(--gmist)}
.ri{width:100%;padding:4px 7px;border:1px solid transparent;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;background:transparent;color:var(--ink)}
.ri:focus{outline:none;border-color:var(--gm);background:var(--white)}
.raw-save{padding:8px 20px;background:var(--gd);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.raw-reset{padding:8px 16px;background:none;color:var(--inkl);border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-left:8px}
.save-notice{font-size:12px;color:var(--gm);font-family:'DM Mono',monospace;margin-left:10px;opacity:0;transition:opacity 0.3s}
.save-notice.show{opacity:1}
.info-box{background:var(--amberp);border:1px solid #e8c070;border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--amber);margin-bottom:14px;line-height:1.5}
.empty-state{text-align:center;padding:48px 20px;color:var(--inkl)}
.empty-icon{font-size:36px;margin-bottom:12px}
@media(max-width:520px){
  .sum-grid{grid-template-columns:repeat(2,1fr)}
  .cal-day{min-height:70px}.cal-ev{font-size:8px}
  .bulk-hdr,.bulk-row-item{grid-template-columns:1.3fr 1.2fr 60px 28px}
}
</style>
</head>

<script>
const DEFAULT_VARIETIES={
  arugula:    {name:'Arugula',        soak:0,blackout:4,open:3,grow:4, seedCost:1.19,yieldG:100,color:'#639922'},
  broccoli:   {name:'Broccoli',       soak:0,blackout:3,open:2,grow:3, seedCost:1.44,yieldG:150,color:'#1D9E75'},
  mustard:    {name:'Mustard',        soak:0,blackout:3,open:2,grow:2, seedCost:2.01,yieldG:125,color:'#BA7517'},
  kohlrabi:   {name:'Purple Kohlrabi',soak:0,blackout:4,open:3,grow:2, seedCost:1.95,yieldG:150,color:'#7F77DD'},
  radish:     {name:'Radish',         soak:0,blackout:3,open:2,grow:2, seedCost:0.87,yieldG:200,color:'#D4537E'},
  redcabbage: {name:'Red Cabbage',    soak:0,blackout:4,open:3,grow:2, seedCost:1.80,yieldG:150,color:'#993556'},
  sunflower:  {name:'Sunflower',      soak:1,blackout:3,open:3,grow:3, seedCost:1.99,yieldG:250,color:'#EF9F27'},
  pea:        {name:'Dwarf Sweet Pea',soak:1,blackout:3,open:3,grow:3, seedCost:1.23,yieldG:250,color:'#5DCAA5'},
  corn:       {name:'Popcorn',        soak:1,blackout:4,open:3,grow:3, seedCost:5.12,yieldG:150,color:'#FAC775'},
  lentil:     {name:'Crimson Lentil', soak:0,blackout:3,open:2,grow:3, seedCost:1.10,yieldG:120,color:'#D85A30'},
  beet:       {name:'Beets Ruby',     soak:1,blackout:4,open:3,grow:3, seedCost:4.00,yieldG:50, color:'#993C1D'},
  cress:      {name:'Curly Cress',    soak:0,blackout:3,open:2,grow:1, seedCost:0.90,yieldG:80, color:'#2a7a5c'},
};
const UNITS=['50g','100g','200g','live'];
let VARIETIES=JSON.parse(localStorage.getItem('gg_var')||'null')||JSON.parse(JSON.stringify(DEFAULT_VARIETIES));
let orders=JSON.parse(localStorage.getItem('gg_ord_v4')||'[]');
const NOW=new Date();let calYear=NOW.getFullYear(),calMonth=NOW.getMonth();
let selUnit={single:'50g',bulk:{},edit:'50g'};
let activeFilter=null;
let bulkRowCount=0;
let ordersSubTab='growing';

function save(){try{localStorage.setItem('gg_ord_v4',JSON.stringify(orders))}catch(e){}}
function saveVar(){try{localStorage.setItem('gg_var',JSON.stringify(VARIETIES))}catch(e){}}
function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isToday(d){const t=today();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function fmtDate(d){return d.toLocaleDateString('en-CA',{month:'short',day:'numeric',weekday:'short'});}
function fmtISO(d){return d.toISOString().slice(0,10);}
function varOpts(sel){return Object.entries(VARIETIES).map(([k,v])=>`<option value="${k}"${k===sel?' selected':''}>${v.name}</option>`).join('');}
function fmtTray(n){if(n===Math.floor(n))return String(n);return parseFloat(n.toFixed(2)).toString();}

// Decimal trays for display
function traysExact(unit,qty,vk){
  const v=VARIETIES[vk];if(!v)return qty;
  const numQty=parseInt(qty,10)||1;
  if(unit==='live')return numQty;
  return(parseInt(unit,10)/v.yieldG)*numQty;
}
function traysFor(unit,qty,vk){return Math.ceil(traysExact(unit,qty,vk));}
function unitDisp(unit,qty){return unit==='live'?`${qty} Live Tray`:`${qty}×${unit}`;}

function dChip(dt){
  const t=today();const diff=Math.round((dt-t)/86400000);
  if(diff===0)return'<span class="today-chip">Today</span>';
  const cls=diff<0?'past':diff<=3?'soon':'future';
  return`<span class="d-chip ${cls}">${diff<0?`D+${Math.abs(diff)}`:`D-${diff}`}</span>`;
}
function calcSched(pStr,vk){
  const v=VARIETIES[vk];const p=new Date(pStr);p.setHours(0,0,0,0);
  const soakStart=v.soak>0?addDays(p,-v.soak):null;
  const lidOpen=addDays(p,v.blackout);
  const harvest=addDays(lidOpen,v.open+v.grow);
  return{soakStart,plant:p,lidOpen,harvest,total:v.soak+v.blackout+v.open+v.grow};
}
function plantFrom(delStr,vk){
  const v=VARIETIES[vk];const d=new Date(delStr);d.setHours(0,0,0,0);
  return addDays(d,-(v.soak+v.blackout+v.open+v.grow));
}
function getStatus(s){
  const t=today();
  if(s.soakStart&&t>=s.soakStart&&t<s.plant)return{label:'Soaking',key:'soak'};
  if(t<s.plant)return{label:'Pending',key:'pending'};
  if(t<s.lidOpen)return{label:'Blackout',key:'blackout'};
  if(t<=s.harvest)return{label:'Growing',key:'grow'};
  return{label:'Done',key:'done'};
}
function selectUnit(ctx,unit){
  selUnit[ctx]=unit;
  const grid=document.getElementById('ug-'+ctx);
  if(grid)grid.querySelectorAll('.unit-btn').forEach((b,i)=>b.classList.toggle('active',UNITS[i]===unit));
  if(ctx==='single')updatePreview();
  if(ctx==='edit')updateEditPreview();
}
function selectBulkUnit(rowId,unit){
  selUnit.bulk[rowId]=unit;
  const grid=document.getElementById(`bu-${rowId}`);
  if(grid)grid.querySelectorAll('.unit-btn').forEach((b,i)=>b.classList.toggle('active',UNITS[i]===unit));
  updateBulkSum();
}
function renderSummary(){
  const t=today(),tasks=getTodayTasks();
  const active=orders.filter(o=>{const s=calcSched(o.plantDate,o.variety);return t>=s.plant&&t<=s.harvest;});
  const soon=orders.filter(o=>{const s=calcSched(o.plantDate,o.variety);const d=Math.round((s.harvest-t)/86400000);return d>=0&&d<=3;});
  const pend=orders.filter(o=>{const s=calcSched(o.plantDate,o.variety);return t<s.plant;});
  const metrics=[
    {key:'today',val:tasks.length,label:"Today's Tasks",alert:tasks.length>0},
    {key:'active',val:active.length,label:'Growing',alert:false},
    {key:'soon',val:soon.length,label:'Harvest ≤3d',alert:soon.length>0},
    {key:'pending',val:pend.length,label:'Upcoming',alert:false},
  ];
  document.getElementById('summary').innerHTML=metrics.map(m=>
    `<div class="metric${m.alert?' alert':''}${activeFilter===m.key?' active-filter':''}" onclick="toggleFilter('${m.key}')">
      <div class="metric-val">${m.val}</div><div class="metric-label">${m.label}</div></div>`).join('');
  document.getElementById('dot-today').style.display=tasks.length?'inline-block':'none';
}
function toggleFilter(key){activeFilter=activeFilter===key?null:key;renderSummary();renderGrowing();}

function getTodayTasks(){
  const tasks=[];
  orders.forEach(o=>{
    const s=calcSched(o.plantDate,o.variety);const v=VARIETIES[o.variety];
    const exactT=traysExact(o.orderUnit||'100g',o.orderQty||1,o.variety);
    if(s.soakStart&&isToday(s.soakStart))tasks.push({o,v,label:'Start Soak',icon:'💧',sub:`${v.name} · ${fmtTray(exactT)} tray`});
    if(isToday(s.plant))tasks.push({o,v,label:'Plant',icon:'🌱',sub:`${v.name} · ${fmtTray(exactT)} tray`,isPlant:true});
    if(isToday(s.lidOpen))tasks.push({o,v,label:'Open Lid',icon:'☀️',sub:`${v.name} · start light`,urgent:true});
    if(isToday(s.harvest))tasks.push({o,v,label:`Harvest / Deliver — ${o.customer}`,icon:'✂️',sub:`${v.name} ${fmtTray(exactT)} tray → ${unitDisp(o.orderUnit||'100g',o.orderQty||1)}`,htask:true});
  });
  return tasks;
}
function renderToday(){
  const el=document.getElementById('tab-today');
  const tasks=getTodayTasks();
  if(!tasks.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">✓</div>Nothing scheduled for today</div>`;return;}
  // Planting summary
  const plantTasks=tasks.filter(t=>t.isPlant);
  let plantSummaryHtml='';
  if(plantTasks.length){
    const byVar={};
    plantTasks.forEach(t=>{
      const vk=t.o.variety;
      const exactT=traysExact(t.o.orderUnit||'100g',t.o.orderQty||1,vk);
      if(!byVar[vk])byVar[vk]={v:t.v,orders:[],total:0};
      byVar[vk].orders.push({customer:t.o.customer,tray:exactT,unit:unitDisp(t.o.orderUnit||'100g',t.o.orderQty||1)});
      byVar[vk].total+=exactT;
    });
    const rows=Object.entries(byVar).map(([vk,d])=>{
      const ceilT=Math.ceil(d.total);
      const detail=d.orders.map(o=>`${o.customer}: ${fmtTray(o.tray)} (${o.unit})`).join(' · ');
      return`<div class="plant-sum-row">
        <div>
          <div class="plant-sum-name"><span style="width:8px;height:8px;border-radius:50%;background:${d.v.color};display:inline-block"></span>${d.v.name}</div>
          <div class="plant-sum-detail">${detail}</div>
        </div>
        <div class="plant-sum-tray">${fmtTray(d.total)} tray<span class="plant-sum-tray-ceil">plant ${ceilT}</span></div>
      </div>`;
    }).join('');
    plantSummaryHtml=`<div class="plant-summary"><div class="plant-summary-title">🌱 Today's Planting Summary</div>${rows}</div>`;
  }
  el.innerHTML=`<div class="slabel">${today().toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'})}</div>`
    +plantSummaryHtml
    +tasks.map(t=>`<div class="task-item${t.urgent?' urgent':''}${t.htask?' htask':''}">
      <div class="task-icon">${t.icon}</div>
      <div><div class="task-title">${t.label}</div>
      <div class="task-sub">${t.o.customer} · ${t.sub}</div></div></div>`).join('');
}

function renderGrowing(){
  const el=document.getElementById('orders-growing');
  const t=today();
  let filtered=orders;
  if(activeFilter==='today'){const ids=new Set(getTodayTasks().map(tk=>tk.o.id));filtered=orders.filter(o=>ids.has(o.id));}
  else if(activeFilter==='active')filtered=orders.filter(o=>{const s=calcSched(o.plantDate,o.variety);return t>=s.plant&&t<=s.harvest;});
  else if(activeFilter==='soon')filtered=orders.filter(o=>{const s=calcSched(o.plantDate,o.variety);const d=Math.round((s.harvest-t)/86400000);return d>=0&&d<=3;});
  else if(activeFilter==='pending')filtered=orders.filter(o=>{const s=calcSched(o.plantDate,o.variety);return t<s.plant;});
  if(!filtered.length){
    el.innerHTML=orders.length?`<div class="empty-state"><div class="empty-icon">🔍</div>No orders match this filter<br><button class="filter-clear" style="margin-top:12px" onclick="toggleFilter(activeFilter)">Clear Filter</button></div>`:`<div class="empty-state"><div class="empty-icon">🌿</div>No orders yet</div>`;
    return;
  }
  const byCustomer={};
  filtered.forEach(o=>{if(!byCustomer[o.customer])byCustomer[o.customer]=[];byCustomer[o.customer].push(o);});
  Object.values(byCustomer).forEach(arr=>arr.sort((a,b)=>new Date(a.delivery)-new Date(b.delivery)));
  const filterLabel=activeFilter?{today:"Today's Tasks",active:'Growing',soon:'Harvest ≤3d',pending:'Upcoming'}[activeFilter]:null;
  const hdr=filterLabel?`<div class="filter-bar"><div class="slabel">${filterLabel} · ${filtered.length} orders</div><button class="filter-clear" onclick="toggleFilter('${activeFilter}')">✕ Clear</button></div>`:`<div class="slabel">${Object.keys(byCustomer).length} customer${Object.keys(byCustomer).length!==1?'s':''} · ${filtered.length} orders</div>`;
  const bc={pending:'s-pending',soak:'s-soak',blackout:'s-blackout',grow:'s-grow',done:'s-done'};
  el.innerHTML=hdr+Object.entries(byCustomer).map(([customer,custOrders])=>{
    const varieties=[...new Set(custOrders.map(o=>VARIETIES[o.variety]?.name||o.variety))].join(', ');
    const nextDel=custOrders[0]?.delivery||'';
    const accId='acc-'+customer.replace(/\W/g,'_');
    const ordersHtml=custOrders.map(o=>{
      const s=calcSched(o.plantDate,o.variety);const v=VARIETIES[o.variety];
      const st=getStatus(s);
      const exactT=traysExact(o.orderUnit||'100g',o.orderQty||1,o.variety);
      const ceilT=Math.ceil(exactT);
      const tot=v.soak+v.blackout+v.open+v.grow;
      const phases=[...(v.soak>0?[{d:v.soak,c:'#378ADD'}]:[]),{d:v.blackout,c:'#534AB7'},{d:v.open+v.grow,c:v.color}].filter(p=>p.d>0);
      const phBar=phases.map(p=>`<div class="phase-seg" style="width:${Math.round(p.d/tot*100)}%;background:${p.c};opacity:0.8"></div>`).join('');
      const trayDisp=exactT===ceilT?`${ceilT} tray`:`${fmtTray(exactT)} tray (plant ${ceilT})`;
      const rows=[...(s.soakStart?[['💧 Soak Start',s.soakStart]]:[]),['🌱 Plant Date',s.plant],['☀️ Lid Open',s.lidOpen],['✂️ Harvest/Deliver',s.harvest]];
      return`<div class="order-card">
        <div class="order-hd">
          <div>
            <div class="ocust"><span class="vdot" style="background:${v.color}"></span>${v.name}</div>
            <div class="ometa">Order: ${unitDisp(o.orderUnit||'100g',o.orderQty||1)}<span class="tray-chip">${trayDisp}</span></div>
            <div class="ometa" style="margin-top:3px">Seed cost $${(v.seedCost*ceilT).toFixed(2)}${o.note?' · '+o.note:''}</div>
          </div>
          <div class="card-actions">
            <span class="sbadge ${bc[st.key]||'s-grow'}">${st.label}</span>
            <button class="edit-btn" onclick="openEdit(${o.id})">Edit</button>
            <button class="del-btn" onclick="deleteOrder(${o.id})">×</button>
          </div>
        </div>
        <div class="phase-row"><div class="phase-bar">${phBar}</div>
          <div class="phase-labels">${v.soak>0?'<span>Soak</span>':'<span></span>'}<span>Blackout</span><span>Grow/Harvest</span></div>
        </div>
        <div class="tl-grid">${rows.map(([lb,dt])=>`<div class="tl-row"><div class="tl-label">${lb}</div><div>${fmtDate(dt)}${dChip(dt)}</div></div>`).join('')}</div>
      </div>`;
    }).join('');
    return`<div class="cust-accordion">
      <div class="cust-acc-hd" id="${accId}-hd" onclick="toggleAcc('${accId}')">
        <div>
          <div class="cust-name">${customer}</div>
          <div class="cust-meta">${custOrders.length} order${custOrders.length!==1?'s':''} · ${varieties} · Next: ${nextDel}</div>
        </div>
        <span class="cust-chevron" id="${accId}-chev">▾</span>
      </div>
      <div class="cust-acc-body" id="${accId}-body">${ordersHtml}</div>
    </div>`;
  }).join('');
}
function toggleAcc(id){
  const body=document.getElementById(id+'-body');
  const hd=document.getElementById(id+'-hd');
  const chev=document.getElementById(id+'-chev');

  const fields=[{key:'soak',label:'Soak (d)'},{key:'blackout',label:'Blackout (d)'},{key:'open',label:'Light (d)'},{key:'grow',label:'Grow (d)'},{key:'seedCost',label:'Seed Cost ($)',step:'0.01'},{key:'yieldG',label:'Yield (g/tray)'}];
  const rows=Object.entries(VARIETIES).map(([key,v])=>`<tr><td style="padding:6px 10px"><span class="vdot" style="background:${v.color}"></span><strong>${v.name}</strong></td>${fields.map(f=>`<td><input class="ri" type="number" step="${f.step||1}" min="0" value="${v[f.key]}" onchange="rawChange('${key}','${f.key}',this.value)"></td>`).join('')}<td id="tot-${key}" style="font-size:11px;color:var(--inkl);font-family:'DM Mono',monospace;white-space:nowrap">${v.soak+v.blackout+v.open+v.grow}d total</td></tr>`).join('');
  el.innerHTML=`<div class="info-box">Yield (g/tray) = harvest per tray. E.g. Arugula 100g/tray → 50g order = 0.5 tray. Orders are shown in exact decimals; planting trays are rounded up.</div><div class="raw-wrap"><table class="raw-tbl"><thead><tr><th>Variety</th>${fields.map(f=>`<th>${f.label}</th>`).join('')}<th>Total Days</th></tr></thead><tbody>${rows}</tbody></table></div><div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px"><button class="raw-save" onclick="saveRaw()">Save</button><button class="raw-reset" onclick="resetRaw()">Reset Defaults</button><span class="save-notice" id="save-notice">Saved ✓</span></div>`;
}
function rawChange(vk,field,val){const num=parseFloat(val);if(!isNaN(num)){VARIETIES[vk][field]=num;const v=VARIETIES[vk];const tot=document.getElementById(`tot-${vk}`);if(tot)tot.textContent=`${v.soak+v.blackout+v.open+v.grow}d total`;}}
function saveRaw(){saveVar();render();const n=document.getElementById('save-notice');if(n){n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2000);}}
function resetRaw(){if(!confirm('Reset all variety data to defaults?'))return;VARIETIES=JSON.parse(JSON.stringify(DEFAULT_VARIETIES));saveVar();renderRaw();render();}
function switchTab(name){
  ['today','orders','calendar','add','raw'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';document.getElementById('nb-'+t).classList.toggle('active',t===name);});
  if(name==='calendar')renderCalendar();if(name==='raw')renderRaw();
}
function switchAddMode(mode){['single','bulk','invoice'].forEach(m=>{document.getElementById('add-'+m).style.display=m===mode?'block':'none';document.getElementById('am-'+m).classList.toggle('active',m===mode);});}
function render(){renderSummary();renderToday();renderGrowing();if(ordersSubTab==='list')renderOrderList();}
document.getElementById('hdate').textContent=new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
const todayStr=new Date().toISOString().slice(0,10);
['f-delivery','b-delivery','inv-delivery'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=todayStr;});
document.getElementById('f-variety').innerHTML=varOpts('arugula');
document.getElementById('edit-variety').innerHTML=varOpts('arugula');
initBulkRows();render();
</script>
</body>
</html>
